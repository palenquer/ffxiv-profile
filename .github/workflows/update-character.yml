name: Update Character Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Lodestone data
        env:
          LODESTONE_ID: ${{ secrets.LODESTONE_ID }}
        run: node scripts/setup.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/character.json public/images/hero.jpg
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: sync character data from Lodestone"
          git push
